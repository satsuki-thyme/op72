# エピソードプロット 第1章 第10話

- scene: 1
  descriptor: ディックスの処理と裁判の終了
  gist:
    - gis-item: 侯爵フェルダーに襲い掛かるディックスをエクトが沈める

  meaning of the scene:
    - 前話フックの回収

  interest:
    - int-item: なぜか余裕のフェルダー, 助けてもらえると信じていたよ
    - int-item: エクトが一瞬で沈める

  matters of desire:
    - dn: ディックス
      desire: 裁判の行方を取り戻したい
      conflict:
        - dn: エクト
          desire: 無法は許さない
      risk: 犯罪者になる
      results: 沈められる

  value change:
    - dn: エクト
      value: 公正・平穏な裁判
      change: .--- / .+++

  unpredictability of the end:
    - これからどうするのか

  scene elements:

    - beat:
      descriptor: ディックス討伐
      interest: ディックスを倒すところ
      turning point: false
      relationship:
        - item:
          send: 侯爵フェルダーが防御しようとしない
          receive: 助けてもらえると信じていたよ

      performance:
        - pre-action:
          - dn: ディックス
            tone: 狂気
            contents: ぶち壊してやる
            activity: 侯爵フェルダーに襲い掛かる
        - action:
          - dn: 侯爵フェルダー
            tone: 冷静
            contents: 言い伝えが真実ならエクト少年が助けてくれるはず
            activity: 身動ぎもしない
            expectation: 助かる
          - dn: エクト
            tone: 冷静
            contents: 無法は許さない
            activity: ディックスに攻撃する
            expectation: 沈めたい
        - reaction:
          - dn: ディックス
            tone: 悶絶
            contents: 悶絶
            activity: 沈む
        - post-reaction:
          - dn: 侯爵フェルダー
            tone: 満足
            contents: 満足
            activity: 助けてくれると信じていたよ
        - narration in beat:
            - 結審
            - エクトたちの縄と敗者の首輪が即座に解除される
            - 貴族たちは退出し、傍聴者が帰され、最後にエクトたちが解放された



- scene: 2
  descriptor: キスカが侯爵フェルダーに向かう
  gist:
    - gis-item: キスカが言いにくそうにして知り合いに会うと言う
    - gis-item: エルミナが宝玉を見せたいから一緒に待つと言う
    - gis-item: キスカがメイドを買収して侯爵フェルダーに会いにいく

  meaning of the scene:
    - 接続部

  interest:
    - int-item: キスカの様子が変
    - int-item: キスカの世慣れた買収の様子

  matters of desire:
    - dn: キスカ
      desire: エクトたちにバレずに侯爵フェルダーに会いたい
      conflict:
        - dn: エクトたち
          desire: キスカの不審さへの困惑
        - dn: メイド
          desire: 平民を貴人に会わせるなんてとんでもない
      risk: エクトたちに身の上がバレたり、侯爵フェルダーの真意を知ることができない
      results: 上手くいく

  value change:
    - dn: キスカ
      value: 作戦の成功
      change: --. / .++

  unpredictability of the end:
    - キスカはなぜ侯爵フェルダーに会いたいのか

  scene elements:

    - beat:
      descriptor: 不審なキスカ
      interest: 不審なキスカ
      turning point: false
      relationship:
        - item:
          send: 不審なキスカ
          receive: 実は王女

      performance:
        - action:
          - dn: キスカ
            tone: 不審
            contents: みんなにバレないよう侯爵フェルダーに会いにいく
            activity: 実家の知り合いに会ってくる
            expectation: 不信を招きたくない
        - reaction:
          - dn: エクト
            tone: 何気ない
            contents: 城に知り合いがいるなんて凄い
            activity: さすがだと驚く
          - dn: フェリ
            tone: 冷静
            contents: 分析
            activity: キスカの名は聞き及んでいたけど城に伝があるなんて余程ですね

    - beat:
      descriptor: 言い繕うキスカ
      interest: 垣間見える嘘
      turning point: false
      relationship:
        - item:
          send: 大したことない
          receive: 相手は侯爵

      performance:
        - action:
          - dn: キスカ
            tone: 不審
            contents: 誤魔化す
            activity: 相手はそんなに偉い人じゃない
            expectation: 相手が侯爵だとバレませんように
        - reaction:
          - dn: エクトとフェリ
            tone: 和やか
            contents: 謙遜しているんだな
            activity: エクトとフェリは分かってますよ、という表情で了解する

    - narration:
      descriptor: 後の予定調整
      relationship:
        - item:
          send: エクトは改まって伝えたいことがある
          receive: （エルミナとの、恋の話し合いを受けて）戻ってきたキスカ、伝えていことって？

      contents:
        - 城の門前広場には中央に古代の石柱があり、そこで待ち合わせすることに
        - エルミナが宝玉を見せたいから自分も待たせてもらいたい
        - 貴族の厄介さを知ったエクトが貴族に関わるとき助けてほしいとキスカとフェリに伝えたい

    - narration:
      descriptor: 世慣れしたキスカ
      relationship:
        - item:
          send: /-
          receive: /-

      contents:
        - 通り掛かったメイドに銀貨を掴ませて侯爵フェルダーと面会の機会を作った
        - 侯爵フェルダーはこのことを予想していたので話は簡単だった

