# エピソードプロット 第1章 第10話

- scene: 1
  sn-descriptor: ディックスの処理と裁判の終了
  gist:
    - gis-item: 侯爵フェルダーに襲い掛かるディックスをエクトが沈める

  meaning of the scene:
    - 前話フックの回収

  interest:
    - int-item: なぜか余裕のフェルダー, 助けてもらえると信じていたよ
    - int-item: エクトが一瞬で沈める

  matters of desire:
    - ds-dn: ディックス
      desire: 裁判の行方を取り戻したい
      conflict:
        - ds-dn: エクト
          desire: 無法は許さない
      risk: 犯罪者になる
      results: 沈められる

  value change:
    - vl-dn: エクト
      value: 公正・平穏な裁判
      change: .--- / .+++

  unpredictability of the end:
    - これからどうするのか

  scene elements:

    - beat group:
      bg-descriptor:
      bg-contents:

        - beat:
          bt-descriptor: ディックス討伐

          performance:
            - pre-action:
              - pf-dn: ディックス
                tone: 狂気
                pf-contents: ぶち壊してやる
                activity: 侯爵フェルダーに襲い掛かる
            - action:
              - pf-dn: 侯爵フェルダー
                tone: 冷静
                pf-contents: 言い伝えが真実ならエクト少年が助けてくれるはず
                activity: 身動ぎもしない
              - pf-dn: エクト
                tone: 冷静
                pf-contents: 無法は許さない
                activity: ディックスに攻撃する
            - reaction:
              - pf-dn: ディックス
                tone: 悶絶
                pf-contents: 悶絶
                activity: 沈む
            - post-reaction:
              - pf-dn: 侯爵フェルダー
                tone: 満足
                pf-contents: 満足
                activity: 助けてくれると信じていたよ
            - narration in beat:
                - 結審
                - エクトたちの縄と敗者の首輪が即座に解除される
                - 貴族たちは退出し、傍聴者が帰され、最後にエクトたちが解放された

- scene: 2
  sn-descriptor: キスカが侯爵フェルダーに向かう
  gist:
    - gis-item: キスカが言いにくそうにして知り合いに会うと言う
    - gis-item: エルミナが宝玉を見せたいから一緒に待つと言う
    - gis-item: キスカがメイドを買収して侯爵フェルダーに会いにいく

  meaning of the scene:
    - 接続部

  interest:
    - int-item: キスカの様子が変
    - int-item: キスカの世慣れた買収の様子

  matters of desire:
    - ds-dn: キスカ
      desire: エクトたちにバレずに侯爵フェルダーに会いたい
      conflict:
        - ds-dn: エクトたち
          desire: キスカの不審さへの困惑
        - ds-dn: メイド
          desire: 平民を貴人に会わせるなんてとんでもない
      risk: エクトたちに身の上がバレたり、侯爵フェルダーの真意を知ることができない
      results: 上手くいく

  value change:
    - vl-dn: キスカ
      value: 作戦の成功
      change: --. / .++

  unpredictability of the end:
    - キスカはなぜ侯爵フェルダーに会いたいのか

  scene elements:

    - beat group:
      bg-descriptor:
      bg-contents:

        - beat:
          bt-descriptor: 不審なキスカ

          performance:
            - action:
              - pf-dn: キスカ
                tone: 不審
                pf-contents: みんなにバレないよう侯爵フェルダーに会いにいく
                activity: 実家の知り合いに会ってくる
            - reaction:
              - pf-dn: エクト
                tone: 何気ない
                pf-contents: 城に知り合いがいるなんて凄い
                activity: さすがだと驚く
              - pf-dn: フェリ
                tone: 冷静
                pf-contents: 分析
                activity: キスカの名は聞き及んでいたけど城に伝があるなんて余程ですね

        - beat:
          bt-descriptor: 言い繕うキスカ

          performance:
            - action:
              - pf-dn: キスカ
                tone: 不審
                pf-contents: 誤魔化す
                activity: 相手はそんなに偉い人じゃない
            - reaction:
              - pf-dn: エクトとフェリ
                tone: 和やか
                pf-contents: 謙遜しているんだな
                activity: エクトとフェリは分かってますよ、という表情で了解する

    - beat group:
      bg-descriptor:
      bg-contents:

        - narration:
          nr-descriptor: 後の予定調整

          nr-contents:
            - 城の門前広場には中央に古代の石柱があり、そこで待ち合わせすることに
            - エルミナが宝玉を見せたいから自分も待たせてもらいたい
            - 貴族の厄介さを知ったエクトが貴族に関わるとき助けてほしいとキスカとフェリに伝えたい

        - narration:
          nr-descriptor: 世慣れしたキスカ

          nr-contents:
            - 通り掛かったメイドに銀貨を5枚掴ませて侯爵フェルダーと面会の機会を作った
            - 侯爵フェルダーの部屋の護衛に渡す銀貨もある
            - 侯爵フェルダーはこのことを予想していたので話は簡単だった

- scene: 3
  sn-descriptor: キスカと侯爵フェルダー
  gist:
    - gis-item: キスカが侯爵フェルダーに、お父様に報告するのか尋ねる
    - gis-item: 侯爵フェルダーが淵神の恩寵、屍蝋の闇炎について話す

  meaning of the scene:
    - メイン 1 = キスカの事情

  interest:
    - int-item: キスカの秘密
    - int-item: 侯爵フェルダーの軽妙さ
    - int-item: 謎の解明
    - int-item: 侯爵フェルダーがエクトに何か言われたか尋ねる

  matters of desire:
    - ds-dn: キスカ
      desire: 侯爵フェルダーに報告させたくない
      conflict:
        - ds-dn: 侯爵フェルダー
          desire: 不明
      risk: 父王にバレる
      results: バレずに済む

  value change:
    - vl-dn: キスカ
      value: 今の生活の保障
      change: .--- / .++++

  unpredictability of the end:
    - エクトは何か隠しているか

  scene elements:

    - beat group:
      bg-descriptor:
      bg-contents:

        - beat:
          bt-descriptor: キスカが侯爵フェルダーの部屋に入るなり詰問する

          performance:
            - action:
              - pf-dn: キスカ
                tone: 鬼気迫る
                pf-contents: ことによっては
                activity: お父様に報告するの！？
            - reaction:
              - pf-dn: 侯爵フェルダー
                tone: 余裕を持ってレディに対する
                pf-contents: 伝えない
                activity: 真実の忠誠は時に王命をも凌ぎます

        - beat:
          bt-descriptor: キスカが侯爵フェルダーの思惑を探る

          performance:
            - action:
              - pf-dn: キスカ
                tone: 詰問
                pf-contents: 思惑は何
                activity: その発言は重罪よ。何を考えているの！？
            - reaction:
              - pf-dn: 侯爵フェルダー
                tone: 余裕を持ってレディに対する
                pf-contents: キスティーナ殿下の誕生が予言されていたこと, ハイフレック家が存在するただ一つの理由
                activity: 伝説と予言、その結晶を仰いでいるに過ぎません

        - beat:
          bt-descriptor: キスカが侯爵フェルダーの思惑を訝しむ

          performance:
            - action:
              - pf-dn: キスカ
                tone: 胡乱
                pf-contents: 誤魔化さないで
                activity: 迂遠な言葉で煙に巻くのは上手ね
            - reaction:
              - pf-dn: 侯爵フェルダー
                tone: 余裕を持ってレディに対する
                pf-contents: 今は言えない
                activity: いずれ煙は晴れましょう

    - beat group:
      bg-descriptor:
      bg-contents:

        - beat:
          bt-descriptor: 侯爵フェルダーがエクトから何か重大なことを聞かされていないか尋ねる

          performance:
            - action:
              - pf-dn: 侯爵フェルダー
                tone: 余裕を持ってレディに対する
                pf-contents: 重要なことを知りたい
                activity: それよりエクト少年は何か言っていませんでしたか
            - reaction:
              - pf-dn: キスカ
                tone: 困惑
                pf-contents: 困惑
                activity: 何って、なんのことだか分からないわ

        - beat:
          bt-descriptor: キスカが侯爵フェルダーに強烈に反応する

          performance:
            - action:
              - pf-dn: キスカ
                tone: 詰問
                pf-contents: エクトに手を出したら許さない
                activity: エクトに手を出したら許さないわ！
            - reaction:
              - pf-dn: 侯爵フェルダー
                tone: 余裕を持ってレディに対する
                pf-contents: 滅相もない
                activity: 忠誠に誓って悪いようには致しません

    - beat group:
      bg-descriptor:
      bg-contents:

        - beat:
