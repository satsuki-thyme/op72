        - beat:
          beat descriptor: エルミナがエクトに、キスカを大切にしてと言う

          beat performance:
            - beat action:
              - beat dn: エルミナ
                beat tone: 真剣
                beat activity: キスカを大切にしてほしい、思いを伝えてほしい

            - beat reaction:
              - beat dn: エクト
                beat tone: 真剣
