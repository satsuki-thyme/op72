# エピソードプロット 第1章 第10話

- scene: 1
  scene descriptor: ディックスの処理と裁判の終了
  scene gist:
    - scene gist item: 侯爵フェルダーに襲い掛かるディックスをエクトが沈める

  scene meaning of the scene: 前話フックの回収

  scene interest:
    - scene interest item: なぜか余裕のフェルダー, 助けてもらえると信じていたよ
    - scene interest item: エクトが一瞬で沈める

  scene matters of desire:
    - scene dn: ディックス
      scene desire: 裁判の行方を取り戻したい
      scene conflict:
        - scene dn: エクト
          scene desire: 無法は許さない
      scene risk: 犯罪者になる
      scene results: 沈められる

  scene value change:
    - scene dn: エクト
      scene value: 公正・平穏な裁判
      scene change: .--- / .+++

  scene unpredictability of the end: これからどうするのか

  scene elements:

    - beat group: 

      beat contents:

        - beat:
          beat descriptor: ディックス討伐

          beat performance:
            - beat pre-action:
              - beat dn: ディックス
                beat tone: 狂気
                beat activity: 侯爵フェルダーに襲い掛かる

            - beat action:
              - beat dn: 侯爵フェルダー
                beat tone: 冷静
                beat activity: 身動ぎもしない

              - beat dn: エクト
                beat tone: 冷静
                beat activity: ディックスに攻撃する

            - beat reaction:
              - beat dn: ディックス
                beat tone: 悶絶
                beat activity: 沈む

            - beat post-reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 満足
                beat activity: 助けてくれると信じていたよ

            - beat narration in beat:
                - 結審
                - エクトたちの縄と敗者の首輪が即座に解除される
                - 貴族たちは退出し、傍聴者が帰され、最後にエクトたちが解放された

- scene: 2
  scene descriptor: キスカが侯爵フェルダーに向かう
  scene gist:
    - scene gist item: キスカが言いにくそうにして知り合いに会うと言う
    - scene gist item: エルミナが宝玉を見せたいから一緒に待つと言う
    - scene gist item: キスカがメイドを買収して侯爵フェルダーに会いにいく

  scene meaning of the scene: 接続部

  scene interest:
    - scene interest item: キスカの様子が変
    - scene interest item: キスカの世慣れた買収の様子

  scene matters of desire:
    - scene dn: キスカ
      scene desire: エクトたちにバレずに侯爵フェルダーに会いたい
      scene conflict:
        - scene dn: エクトたち
          scene desire: キスカの不審さへの困惑
        - scene dn: メイド
          scene desire: 平民を貴人に会わせるなんてとんでもない
      scene risk: エクトたちに身の上がバレたり、侯爵フェルダーの真意を知ることができない
      scene results: 上手くい
  scene   value change:
    - scene dn: キスカ
      scene value: 作戦の成功
      scene change: --. / .++

  scene unpredictability of the end: キスカはなぜ侯爵フェルダーに会いたいのか

  scene elements:

    - beat group: 

      beat contents:

        - beat:
          beat descriptor: 不審なキスカ

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 不審
                beat activity: 実家の知り合いに会ってくる

            - beat reaction:
              - beat dn: エクト
                beat tone: 何気ない
                beat activity: さすがだと驚く

              - beat dn: フェリ
                beat tone: 冷静
                beat activity: キスカの名は聞き及んでいたけど城に伝があるなんて余程ですね


        - beat:
          beat descriptor: 言い繕うキスカ

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 不審
                beat activity: 相手はそんなに偉い人じゃない

            - beat reaction:
              - beat dn: エクトとフェリ
                beat tone: 和やか
                beat activity: エクトとフェリは分かってますよ、という表情で了解する


    - beat group: 

      beat contents:

        - narration:
          beat descriptor: 後の予定調整

          beat performance:
            - 城の門前広場には中央に古代の石柱があり、そこで待ち合わせすることに
            - エルミナが宝玉を見せたいから自分も待たせてもらいたい
            - 貴族の厄介さを知ったエクトが貴族に関わるとき助けてほしいとキスカとフェリに伝えたい

        - narration:
          beat descriptor: 世慣れしたキスカ

          beat performance:
            - 通り掛かったメイドに銀貨を5枚掴ませて侯爵フェルダーと面会の機会を作った
            - 侯爵フェルダーの部屋の護衛に渡す銀貨もある
            - 侯爵フェルダーはこのことを予想していたので話は簡単だった

- scene: 3
  scene descriptor: キスカと侯爵フェルダー
  scene gist:
    - scene gist item: キスカが侯爵フェルダーに、お父様に報告するのか尋ねる
    - scene gist item: 侯爵フェルダーが淵神の恩寵、屍蝋の闇炎について話す

  scene meaning of the scene: メイン 1 = キスカの事情

  scene interest:
    - scene interest item: キスカの秘密
    - scene interest item: 侯爵フェルダーの軽妙さ
    - scene interest item: 謎の解明
    - scene interest item: 侯爵フェルダーがエクトに何か言われたか尋ねる

  scene matters of desire:
    - scene dn: キスカ
      scene desire: 侯爵フェルダーに報告させたくない
      scene conflict:
        - scene dn: 侯爵フェルダー
          scene desire: 不明
      scene risk: 父王にバレる
      scene results: バレずに済む

  scene value change:
    - scene dn: キスカ
      scene value: 今の生活の保障
      scene change: .--- / .++++

  scene unpredictability of the end: エクトは何か隠しているか

  scene elements:

    - beat group: 

      beat contents:

        - beat:
          beat descriptor: キスカが侯爵フェルダーの部屋に入るなり詰問する

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 鬼気迫る
                beat activity: お父様に報告するの！？

            - beat reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 余裕を持ってレディに対する
                beat activity: 真実の忠誠は時に王命をも凌ぎます


        - beat:
          beat descriptor: キスカが侯爵フェルダーの思惑を探る

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 詰問
                beat activity: その発言は重罪よ。何を考えているの！？

            - beat reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 余裕を持ってレディに対する
                beat activity: 伝説と予言、その結晶を仰いでいるに過ぎません


        - beat:
          beat descriptor: キスカが侯爵フェルダーの思惑を訝しむ

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 胡乱
                beat activity: 迂遠な言葉で煙に巻くのは上手ね

            - beat reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 余裕を持ってレディに対する
                beat activity: いずれ煙は晴れましょう


    - beat group: 

      beat contents:

        - beat:
          beat descriptor: 侯爵フェルダーがエクトから何か重大なことを聞かされていないか尋ねる

          beat performance:
            - beat action:
              - beat dn: 侯爵フェルダー
                beat tone: 余裕を持ってレディに対する
                beat activity: それよりエクト少年は何か言っていませんでしたか

            - beat reaction:
              - beat dn: キスカ
                beat tone: 困惑
                beat activity: 何って、なんのことだか分からないわ


        - beat:
          beat descriptor: キスカが侯爵フェルダーに強烈に反応する

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 詰問
                beat activity: エクトに手を出したら許さないわ！

            - beat reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 余裕を持ってレディに対する
                beat activity: 忠誠に誓って悪いようには致しません


    - beat group: 

      beat contents:

        - beat:
          beat descriptor: 侯爵フェルダーが淵神の恩寵について話す

          beat performance:
            - beat action:
              - beat dn: 侯爵フェルダー
                beat tone: 神妙
                beat activity: ディックスの放った紫光の魔法に心当たりがあります　あれは淵神の恩寵という魔導具によるものです

            - beat reaction:
              - beat dn: キスカ
                beat tone: 真剣
                beat activity: あんな恐ろしい魔導具が他にもあるの


        - beat:
          beat descriptor: 侯爵フェルダーが屍蝋の闇炎について話す

          beat performance:
            - beat action:
              - beat dn: 侯爵フェルダー
                beat tone: 気掛かり
                beat activity: 屍蝋の淵神と名乗る謎の郎党が目をつけた者に渡しているようです

            - beat reaction:
              - beat dn: キスカ
                beat tone: 真剣
                beat activity: 覚えておくわ　油断していなくても勝てるかどうか……


    - beat group: 

      beat contents:

        - beat:
          beat descriptor: キスカの重要性に釘を刺す侯爵フェルダーにキスカが尋ねる

          beat performance:
            - beat pre-action:
              - beat dn: 侯爵フェルダー
                beat tone: 気掛かり
                beat activity: お気をつけください　御身は自認されているより重要な存在でございます

            - beat action:
              - beat dn: キスカ
                beat tone: 真剣
                beat activity: あなたは何を知っているの

            - beat reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 真摯
                beat activity: 今は何も、申せません


        - beat:
          beat descriptor: キスカは無理にでも聞こうとするが、キスカ嬢はお帰りだ

          beat performance:
            - beat action:
              - beat dn: キスカ
                beat tone: 怒り
                beat activity: 命令よ、言いなさい

            - beat reaction:
              - beat dn: 侯爵フェルダー
                beat tone: 勝ち誇る
                beat activity: 衛兵、キスカ嬢はお帰りだ　表までお連れしろ

            - beat post-reaction:
              - beat dn: キスカ
                beat tone: 信じられない
                beat activity: 憤怒に目を見張る


